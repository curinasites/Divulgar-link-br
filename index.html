<html lang="pt-BR">
<head>

    <style>
        .bg-custom {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; background-size: cover; background-position: center;
            background-repeat: no-repeat; opacity: 0; transition: opacity 0.8s ease;
        }
        .bg-custom.visible { opacity: 1; }
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none; transition: background 0.5s ease;
        }
        #particles-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2; pointer-events: none;
        }
        .container-lt { position: relative; z-index: 3; }
        .btn-menu {
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
            color: #b0b0c8; width: 42px; height: 42px; border-radius: 12px;
            cursor: pointer; font-size: 20px; display: flex; align-items: center;
            justify-content: center; position: fixed; top: 16px; right: 16px;
            z-index: 300; transition: all 0.3s; backdrop-filter: blur(10px);
        }
        .btn-menu:hover { background: rgba(139,92,246,0.3); color: #fff; transform: scale(1.05); }
        .btn-menu.ativo { background: rgba(139,92,246,0.3); border-color: rgba(139,92,246,0.5); color: #fff; }
        .menu-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 298; opacity: 0; transition: opacity 0.3s;
        }
        .menu-overlay.ativo { display: block; opacity: 1; }
        .menu-painel {
            position: fixed; top: 0; right: -300px; width: 280px; height: 100%;
            background: rgba(22,27,34,0.95); backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255,255,255,0.08); z-index: 299;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; overflow-y: auto;
            box-shadow: -5px 0 30px rgba(0,0,0,0.5);
        }
        .menu-painel.ativo { right: 0; }
        .menu-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.06); text-align: center; }
        .menu-logo-text { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, #6366f1, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .menu-sub { font-size: 10px; color: #808098; font-family: 'JetBrains Mono', monospace; margin-top: 4px; }
        .menu-links { padding: 10px 0; flex: 1; }
        .menu-link {
            display: flex; align-items: center; gap: 12px; padding: 14px 20px;
            color: #b0b0c0; text-decoration: none; font-size: 13px; font-weight: 500;
            transition: all 0.2s; border-left: 3px solid transparent;
        }
        .menu-link:hover { background: rgba(255,255,255,0.03); color: #fff; border-left-color: #8b5cf6; }
        .menu-link .menu-icon { font-size: 16px; width: 20px; text-align: center; }
        .menu-link.destaque { background: rgba(139,92,246,0.08); color: #a78bfa; border-left-color: #8b5cf6; }
        .menu-link.super { background: rgba(245,158,11,0.05); color: #f59e0b; border-left-color: #f59e0b; }
        .menu-divider { border: none; border-top: 1px solid rgba(255,255,255,0.05); margin: 8px 16px; }
        .menu-footer { padding: 16px; border-top: 1px solid rgba(255,255,255,0.05); text-align: center; font-size: 10px; color: #606060; font-family: 'JetBrains Mono', monospace; }
        .hamburger-linhas { display: flex; flex-direction: column; gap: 5px; }
        .hamburger-linha { width: 20px; height: 2px; background: #b0b0c8; border-radius: 2px; transition: all 0.3s; }
        .btn-menu.ativo .hamburger-linha:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
        .btn-menu.ativo .hamburger-linha:nth-child(2) { opacity: 0; }
        .btn-menu.ativo .hamburger-linha:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }
        .login-modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            z-index: 400; justify-content: center; align-items: center;
        }
        .login-modal-overlay.ativo { display: flex; }
        .login-modal {
            background: rgba(22,27,34,0.95); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 24px;
            padding: 32px; max-width: 400px; width: 90%; text-align: center;
            animation: fadeInModal 0.3s ease;
        }
        @keyframes fadeInModal { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .login-modal h3 { font-size: 22px; color: #a78bfa; margin-bottom: 8px; }
        .login-modal .sub { font-size: 12px; color: #8b949e; font-family: 'JetBrains Mono', monospace; margin-bottom: 24px; }
        .login-modal .form-group { margin-bottom: 14px; text-align: left; }
        .login-modal .form-group label { display: block; font-size: 12px; color: #8b949e; margin-bottom: 5px; }
        .login-modal .form-group input {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #30363d;
            background: #0d1117; color: #c9d1d9; font-size: 14px; transition: all 0.2s ease;
        }
        .login-modal .form-group input:focus { border-color: #8b5cf6; outline: none; transform: translateY(-1px); box-shadow: 0 0 0 3px rgba(139,92,246,0.1); }
        .btn-login-modal {
            width: 100%; padding: 12px; border-radius: 10px; border: none;
            background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff;
            font-weight: 600; cursor: pointer; transition: all 0.3s;
        }
        .btn-login-modal:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(99,102,241,0.4); }
        .btn-close-modal {
            background: transparent; border: 1px solid #30363d; color: #8b949e;
            padding: 8px 16px; border-radius: 8px; cursor: pointer; margin-top: 12px; width: 100%; transition: all 0.2s;
        }
        .btn-close-modal:hover { border-color: #f85149; color: #f85149; }
        .login-erro { color: #f85149; font-size: 12px; margin-top: 8px; display: none; }
        .modal-link { margin-top: 16px; font-size: 12px; }
        .modal-link a { color: #a78bfa; text-decoration: none; }
        .loading-inicial {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 50vh; gap: 14px;
        }
        .loading-inicial .spinner {
            width: 36px; height: 36px; border: 3px solid rgba(139,92,246,0.15);
            border-top-color: #8b5cf6; border-radius: 50%; animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-inicial .text {
            font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #8b949e; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="bg-custom" id="bg-custom"></div>
    <div class="bg-overlay" id="bg-overlay"></div>
    <canvas id="particles-canvas"></canvas>

    <button class="btn-menu" id="btn-menu" onclick="toggleMenu()" title="Menu">
        <div class="hamburger-linhas">
            <div class="hamburger-linha"></div>
            <div class="hamburger-linha"></div>
            <div class="hamburger-linha"></div>
        </div>
    </button>

    <div class="menu-overlay" id="menu-overlay" onclick="toggleMenu()"></div>
    <div class="menu-painel" id="menu-painel">
        <div class="menu-header">
            <div class="menu-logo-text"> Divulga Link BR</div>
            <div class="menu-sub"> menu rápido</div>
        </div>
        <div class="menu-links">
            <a href="cadastro.html" class="menu-link destaque"><span class="menu-icon">🚀</span> Criar Minha Conta</a>
            <a href="#" class="menu-link" onclick="abrirModalLogin(); toggleMenu(); return false;"><span class="menu-icon">🔐</span> Fazer Login</a>
            <hr class="menu-divider">
            <a href="admin.html" class="menu-link" id="menu-painel-link" style="display:none;"><span class="menu-icon">⚙️</span> Meu Painel</a>
            <a href="super-admin.html" class="menu-link super" id="menu-super-link" style="display:none;"><span class="menu-icon">👑</span> Super Admin</a>
            <a href="#" class="menu-link" onclick="logoutDoMenu(); toggleMenu(); return false;" id="menu-logout-link" style="display:none;"><span class="menu-icon">🚪</span> Sair</a>
            <hr class="menu-divider">
            <a href="#" class="menu-link" onclick="toggleMenu(); return false;"><span class="menu-icon">✕</span> Fechar Menu</a>
        </div>
        <div class="menu-footer">© 2026 Divulga Link BR</div>
    </div>

    <div id="login-modal" class="login-modal-overlay">
        <div class="login-modal">
            <h3>🔐 Login</h3>
            <p class="sub"> acesse seu painel</p>
            <div class="form-group"><label>Email</label><input type="email" id="login-email" placeholder="seu@email.com"></div>
            <div class="form-group"><label>Senha</label><input type="password" id="login-senha" placeholder="••••••••"></div>

    <div class="container-lt">
        <header id="header-lt">
            <div class="console-line">
                <img src="favicon.png" alt="Logo" style="width:20px;height:20px;border-radius:50%;object-fit:cover;">
                <span class="console-text"> Divulga Link BR</span>
            </div>
        </header>

        <section class="profile-section" id="profile-section"></section>
        <section class="links-section" id="links-section"></section>
        <section class="media-section" id="media-section"></section>

        <div id="meu-link" style="text-align:center; margin-top:16px;"></div>
        <div id="botoes-admin" style="text-align:center; margin-top:24px; display:none; justify-content:center; gap:10px; flex-wrap:wrap;"></div>

        <footer class="footer-lt" id="footer-lt">
            <p>© 2026 Divulga Link BR - Crie seu perfil gratuitamente</p>
        </footer>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('menu-painel').classList.toggle('ativo');
            document.getElementById('menu-overlay').classList.toggle('ativo');
            document.getElementById('btn-menu').classList.toggle('ativo');
            document.body.style.overflow = document.getElementById('menu-painel').classList.contains('ativo') ? 'hidden' : '';
        }
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape' && document.getElementById('menu-painel').classList.contains('ativo')) toggleMenu();
        });
        function abrirModalLogin() {
            document.getElementById('login-modal').classList.add('ativo');
            document.getElementById('login-email').value = '';
            document.getElementById('login-senha').value = '';
            document.getElementById('login-erro').style.display = 'none';
        }
        function fecharModalLogin() { document.getElementById('login-modal').classList.remove('ativo'); }
        async function fazerLogin() {
            const email = document.getElementById('login-email').value.trim();
            const senha = document.getElementById('login-senha').value;
            const erro = document.getElementById('login-erro');
            erro.style.display = 'none';
            if (!email || !senha) { erro.textContent = 'Preencha email e senha'; erro.style.display = 'block'; return; }
            try {
                await auth.signInWithEmailAndPassword(email, senha);
                fecharModalLogin();
                window.location.href = 'admin.html';
            } catch (error) {
                erro.textContent = 'Email ou senha incorretos';
                erro.style.display = 'block';
            }
        }
        function atualizarMenuPorLogin(user) {
            const painelLink = document.getElementById('menu-painel-link');
            const superLink = document.getElementById('menu-super-link');
            const logoutLink = document.getElementById('menu-logout-link');
            if (user) {
                if (painelLink) painelLink.style.display = 'flex';
                if (logoutLink) logoutLink.style.display = 'flex';
                if (user.email?.toLowerCase() === 'franciscodemelocurina9@gmail.com') {
                    if (superLink) superLink.style.display = 'flex';
                } else { if (superLink) superLink.style.display = 'none'; }
            } else {
                if (painelLink) painelLink.style.display = 'none';
                if (superLink) superLink.style.display = 'none';
                if (logoutLink) logoutLink.style.display = 'none';
            }
        }
        function logoutDoMenu() { auth.signOut(); window.location.href = 'index.html'; }
        auth.onAuthStateChanged((user) => { atualizarMenuPorLogin(user); });
    </script>

    <script>
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 🔥 Lê a cor das partículas da variável CSS (definida pelo app.js)
        function getParticulaCor() {
            const cor = getComputedStyle(document.documentElement).getPropertyValue('--particula-cor').trim();
            return cor || 'rgba(139, 92, 246, 0.4)';
        }

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.3; this.speedY = (Math.random() - 0.5) * 0.3;
                this.opacity = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                // 🔥 Usa a cor personalizada do Super Admin
                const corBase = getParticulaCor();
                // Substitui o último número (alpha) pela opacidade da partícula
                const corFinal = corBase.replace(/[\d.]+\)$/, `${this.opacity})`);
                ctx.fillStyle = corFinal;
                ctx.fill();
            }
        }

        for (let i = 0; i < 50; i++) particles.push(new Particle());
        function animateParticles() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animateParticles); }
        animateParticles();
    </script>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>
    <script src="app.js"></script>
</body>
